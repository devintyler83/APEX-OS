[build]
  publish = "web"

# /app and /board → live Streamlit deployment (302 so it stays updatable)
[[redirects]]
  from   = "/app"
  to     = "https://apexsignal.streamlit.app/"
  status = 302
  force  = true

[[redirects]]
  from   = "/board"
  to     = "https://apexsignal.streamlit.app/"
  status = 302
  force  = true

# Serve landing page for all other paths
[[redirects]]
  from   = "/"
  to     = "/apexos-landing.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/apexos-landing.html"
  status = 200
