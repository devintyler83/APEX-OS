[build]
  publish = "web"

# External app shortcuts (302 so the target URL stays updatable)
[[redirects]]
  from   = "/app"
  to     = "https://apexsignal.streamlit.app/"
  status = 302
  force  = true

[[redirects]]
  from   = "/open"
  to     = "https://apexsignal.streamlit.app/"
  status = 302
  force  = true

[[redirects]]
  from   = "/board"
  to     = "https://apexsignal.streamlit.app/"
  status = 302
  force  = true

# Static pages — must come before the catch-all
[[redirects]]
  from   = "/for-draft-fans"
  to     = "/for-draft-fans.html"
  status = 200

# Root and catch-all → landing page
[[redirects]]
  from   = "/"
  to     = "/apexos-landing.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/apexos-landing.html"
  status = 200
